  <script>
    // The offline bundler may evaluate the app script twice (once pre-transpiled,
    // once via in-browser Babel). The real mount is guarded + error-boundary wrapped
    // and renders correctly; a duplicate evaluation can throw a harmless React
    // "Element type is invalid" before the design-system bundle blob finishes loading.
    // Suppress only that specific transient error so it never surfaces an overlay.
    window.addEventListener("error", function (ev) {
      var m = (ev && ev.message) || (ev && ev.error && ev.error.message) || "";
      if (/Element type is invalid/.test(m)) {
        ev.preventDefault();
        if (ev.stopImmediatePropagation) ev.stopImmediatePropagation();
      }
    }, true);
  </script>

/* ============================================================
   COLORS — editorial-industrial monochrome + one azure signal
   Monochrome 95% of the time. Azure ONLY for active states,
   cursor, link hover, "● disponible" dot, section-index
   underline, and 1–2 metrics. Never as fill.
   ============================================================ */
:root {
  /* --- Ink / paper base ramp --- */
  --ink: #0B0B0D;          /* primary text on light, deepest neutral */
  --void: #060607;         /* near-black canvas (hero, dark sections) */
  --paper: #F3F2EE;        /* warm off-white surface */
  --graphite: #56565C;     /* secondary text */
  --mist: #9A9AA0;         /* tertiary text / disabled */

  /* --- Hairlines (1px technical-drawing rules) --- */
  --line-light: #DEDCD5;   /* divider on paper */
  --line-dark: #1C1C20;    /* divider on void/ink */

  /* --- The signal (azure) — used sparingly --- */
  --signal: #2F6BFF;       /* the electric blue accent */
  --signal-dim: #1E47B8;   /* pressed / darker signal */
  --signal-soft: rgba(47, 107, 255, 0.08); /* faint wash, focus rings, hovers */

  /* --- Semantic aliases (light / paper context) --- */
  --bg-page: var(--paper);
  --bg-inverse: var(--void);
  --text-primary: var(--ink);
  --text-secondary: var(--graphite);
  --text-tertiary: var(--mist);
  --border-hairline: var(--line-light);
  --accent: var(--signal);
  --accent-pressed: var(--signal-dim);
  --accent-wash: var(--signal-soft);
  --focus-ring: var(--signal);

  /* --- Semantic aliases (dark / void context) --- */
  --text-on-dark: var(--paper);
  --text-on-dark-secondary: var(--mist);
  --border-on-dark: var(--line-dark);

  /* --- Overlay gradient for text contrast over hero video --- */
  --hero-veil: linear-gradient(180deg, rgba(6,6,7,0.55) 0%, rgba(6,6,7,0.25) 38%, rgba(6,6,7,0.72) 100%); /* @kind other */
}

/* ============================================================
   TYPOGRAPHY
   Display = Space Grotesk · Body/UI = Inter · Mono = JetBrains Mono
   Display 3.5–6rem (lh 0.95–1) · micro-labels mono 10–11px
   uppercase tracking 0.2em · body 14–15px.
   ============================================================ */
:root {
  /* --- Families --- */
  --font-display: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
  --font-body: "Inter", system-ui, -apple-system, sans-serif;

  --fs-display-md: clamp(2rem, 4.5vw, 3.5rem); /* @kind font */
  --fs-display-sm: clamp(1.5rem, 3vw, 2.25rem); /* @kind font */

  /* --- Body scale: 17px lead · 15px default · 14px dense --- */
  --fs-body-lg: 1.0625rem; /* @kind font */
  --fs-body: 0.9375rem; /* @kind font */
  --fs-body-sm: 0.875rem; /* @kind font */

  /* --- Mono / micro-labels: 11px label · 10px · 13px inline --- */

  --fs-mono-xs: 0.625rem; /* @kind font */
  --fs-mono: 0.8125rem; /* @kind font */

  --fw-regular: 400; /* @kind font */
  --fw-medium: 500; /* @kind font */
  --fw-semibold: 600; /* @kind font */
  --fw-bold: 700; /* @kind font */

  /* --- Line heights --- */

  --tracking-display: -0.02em; /* @kind font */

/* ============================================================
   SPACING — base 8px grid. Lots of air.
   ============================================================ */
:root {
  --space-0: 0;
  --space-1: 0.25rem;  /* 4 */
  --space-2: 0.5rem;   /* 8  — base unit */
  --space-3: 0.75rem;  /* 12 */
  --space-4: 1rem;     /* 16 */
  --space-5: 1.5rem;   /* 24 */
  --space-6: 2rem;     /* 32 */
  --space-8: 3rem;     /* 48 */
  --space-10: 4rem;    /* 64 */
  --space-12: 6rem;    /* 96 */

  --radius-0: 0;

/* ============================================================

  --dur-fast: 0.18s; /* @kind other */

  --dur-slow: 1.2s; /* @kind other */

  /* --- Reveal motion tokens --- */
  --reveal-y: 40px; /* @kind spacing */
  --reveal-y-hero: 120px; /* @kind spacing */
  --stagger: 0.06s; /* @kind other */

  /* --- Marquee --- */
  --marquee-dur: 38s; /* @kind other */
}

    // Idempotent mount. Wait until the ENTIRE design-system namespace is ready
    // (the offline bundler loads the bundle as an async blob), then mount once.
    function pfReady() {
      const NS = window.JohnnyRodrGuezPortfolioDesignSystem_c8b5ed;
      return !!(NS && NS.NavBar && NS.Button && NS.Badge && NS.Tag && NS.SectionLabel
        && typeof ReactDOM !== "undefined" && document.getElementById("root"));
    }
    function pfMount() {
      if (window.__pfMounted) return true;
      if (!pfReady()) return false;
      window.__pfMounted = true;
      ReactDOM.createRoot(document.getElementById("root")).render(
        <PFErrorBoundary><App /></PFErrorBoundary>
      );
      return true;
    }
    if (!pfMount()) {
      let tries = 0;
      const iv = setInterval(() => {
        if (pfMount() || ++tries > 120) clearInterval(iv);
      }, 50);
    }
    } // end run-once guard
